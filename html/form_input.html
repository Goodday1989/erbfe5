<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form_input</title>
  </head>
  <body>
    <form action="/api/process" method="post">
      <input type="text" name="company" id="company" />
      <button></button>
      <a href="" type="submit"></a>
    </form>
    <h1>Input form</h1>
    <form action="">
      <!-- without form enclosing the input, user pressing enter the data will goes to the cache without a destination -->
      <!-- div for name input -->
      <div>
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="enter your name"
          minlength="3"
          maxlength="10"
          required
        />
      </div>
      <br />
      <!-- div for email input -->
      <div>
        <label for="email">Email</label>
        <!-- disabled = value will be empty string, readonly = set value will be sent out -->
        <input
          type="email"
          id="email"
          name="email"
          placeholder="enter your email"
          disabled
          value="abc@abc.com"
        />
      </div>
      <br />
      <!-- div for password input -->
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" />
      </div>
      <br />
      <div>
        <label for="product">Product</label>
        <select name="product" id="product" multiple size="4">
          <option value="iphone">iphone</option>
          <option value="imac" selected>imac</option>
          <option value="ipad">ipad</option>
          <option value="macbook">macbook</option>
        </select>
        <br />
        <textarea
          name="message"
          id="message"
          placeholder="enter your message"
          rows="4"
          cols="40"
          style="resize: none"
        ></textarea>
        <br />
        <!-- checkboxes allow multiple selection -->
        <label for="html">HTML</label>
        <input
          type="checkbox"
          id="html"
          name="languages"
          value="html"
          checked
        />
        <label for="css">CSS</label>
        <input type="checkbox" id="css" name="languages" value="css" disabled />
        <label for="javascript">JAVASCRIPT</label>
        <input
          type="checkbox"
          id="javascript"
          name="languages"
          value="javascript"
        />
        <br />
        <!-- radio buttons are mutually exclusive -->
        <label for="small">Small</label>
        <input type="radio" id="small" name="size" value="small" />
        <label for="medium">Medium</label>
        <input type="radio" id="medium" name="size" value="medium" />
        <label for="large">Large</label>
        <input type="radio" id="large" name="size" value="large" />
        <br />
        <div>
          <label for="color">Color</label>
          <input type="color" name="color" id="color" />
        </div>
        <div>
          <label for="date">Date</label>
          <input type="date" name="date" id="date" />
        </div>
        <div>
          <label for="time">Time</label>
          <input type="time" name="time" id="time" />
        </div>
        <div>
          <label for="week">Week</label>
          <input type="week" name="week" id="week" />
        </div>
        <div>
          <label for="month">Month</label>
          <input type="month" name="month" id="month" />
        </div>
        <div>
          <label for="url">URL</label>
          <input type="url" name="url" id="url" />
        </div>
        <div>
          <label for="range">Range</label>
          <input
            type="range"
            name="range"
            id="range"
            min="0"
            max="100"
            step="5"
            value="50"
            style="width: 300px"
          />
        </div>
        <hr />
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
