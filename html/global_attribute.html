<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DGlobal_attribute</title>
  </head>
  <body>
    <!-- global attribute , repeatable attachable to all elements-->
    <!-- class, avoid using only numbers (clash with CSS), first letter cannot be a number -->
    <h2 class="text-xl">Heading 1</h2>
    <!-- id , is unique within one html page, restrictions same as class,-->
    <h2 id="heading-2">Heading 2</h2>
    <!-- inline style -->
    <h2 style="color: red; text-decoration: underline">Heading 3</h2>
    <!-- title , mouse hover shows title-->
    <h2 title="This is heading 4">Heading 4</h2>
    <!-- hidden -->
    <h2 hidden>Heading 5</h2>
    <!-- contenteditable -->
    <h2 contenteditable="true">Heading 6</h2>
    <!-- draggable -->
    <h2 draggable="true">Heading 7</h2>
    <!-- svg -->
    <svg width="300" height="300">
      <circle
        cx="150"
        cy="150"
        r="100"
        stroke="black"
        stroke-width="2"
        fill="lightblue"
      ></circle>
      <text
        x="150"
        y="155"
        font-size="20"
        text-anchor="middle"
        fill="black
      "
      >
        SVG CIRCLE
      </text>
    </svg>
  </body>
</html>
