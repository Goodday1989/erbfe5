<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./exercise_hiring.css" />
    <title>hire</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h2 class="heading">need to hire a freelancer?</h2>
        <p>
          Sign up, type in what you need and receive free quotes in seconds.
        </p>
        <form action="#" class="card">
          <div class="form-group">
            <!-- habit should give form-group class for forms , input should always have value(name) for backend purpose-->
            <input
              type="text"
              class="card1"
              placeholder="What do you need done?"
              name="text"
            />
            <!-- button habit should always have type -->
            <button class="card2" type="submit">Post a Project</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
